name: Docker Images CI

run-name: Tests + Docker build - ${{ github.ref_name }}

on:
  push:
    branches:
      - main

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run server tests
        run: npm test --prefix server

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (latest)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          load: true
          tags: my-favorite-place-server:latest

      - name: Build frontend image (latest)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          load: true
          tags: my-favorite-place-client:latest
