name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      bruno: ${{ steps.filter.outputs.bruno }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/main.yml'
            client:
              - 'client/**'
              - '.github/workflows/main.yml'
            bruno:
              - 'bruno/**'
              - '.github/workflows/main.yml'

  test-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.bruno == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci --prefix server
      - name: Run server tests
        run: npm test --prefix server

  test-api-bruno:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-server
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.bruno == 'true'
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: favorite_places
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Compile API
        run: npm run build --prefix server

      - name: Start API
        run: |
          DB_HOST=127.0.0.1 DB_PORT=5432 DB_USER=postgres DB_PASSWORD=supersecret DB_NAME=favorite_places nohup npm run start --prefix server > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API startup
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/healthcheck || true)
            if [ "$code" = "404" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not start in time"
          cat server.log
          exit 1

      - name: Run Bruno API tests
        run: npm run test:api:bruno --prefix server

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

  test-client:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        run: npm ci --prefix client
      - name: Run client tests (if present)
        run: npm run test --prefix client --if-present

  docker-build-server:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-server
      - test-api-bruno
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-favorite-place-server:latest

  docker-build-client:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-client
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-favorite-place-client:latest
