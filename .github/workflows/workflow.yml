name: Docker Images CI

run-name: Docker build - ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (latest)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          load: true
          tags: my-favorite-place-server:latest

      - name: Build frontend image (latest)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          load: true
          tags: my-favorite-place-client:latest
